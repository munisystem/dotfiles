packages:
  mise:
  - 'aqua:twpayne/chezmoi'
  - 'aqua:cli/cli'                 # gh
  - 'eza'                          # replaces exa; registry short name -> asdf:mise-plugins/mise-eza
  - 'aqua:starship/starship'
  - 'aqua:neovim/neovim'           # nvim
  - 'asdf:yysushi/asdf-tig@2.5.12' # tig has no prebuilt macOS binary; builds from official source
  - 'aqua:x-motemen/ghq'
  - 'aqua:BurntSushi/ripgrep'      # rg
  - 'aqua:junegunn/fzf'
  - 'aqua:sharkdp/fd'
  - 'aqua:sharkdp/bat'
  - 'aqua:direnv/direnv'
  - 'aqua:peco/peco'               # interactive filter (sibling of fzf)
  - 'aqua:yonaskolb/XcodeGen'      # xcodegen
  - 'core:node@lts'                # pinned to LTS; npx bundled with node
  - 'aqua:astral-sh/uv'            # uvx bundled with uv
  # npm-backed CLIs (need core:node above installed first for the npm backend)
  - 'npm:pnpm'
  - 'npm:nodemon'
  - 'npm:firecrawl-cli'
  - 'npm:@playwright/cli'
  - 'npm:@evenrealities/evenhub-simulator'
